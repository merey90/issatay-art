<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a4a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e5ab;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#grad1)" />
  
  <!-- Outer Ring (Artistic Frame) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="8" stroke-dasharray="20 10 5 10" opacity="0.6" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#grad2)" stroke-width="2" opacity="0.3" />
  
  <!-- Monogram 'II' -->
  <g filter="url(#shadow)" fill="url(#grad2)">
    <!-- First 'I' -->
    <path d="M 180 160 L 220 160 L 220 352 L 180 352 Z" />
    <!-- Serifs for First 'I' -->
    <path d="M 160 160 L 240 160 L 240 176 L 160 176 Z" />
    <path d="M 160 336 L 240 336 L 240 352 L 160 352 Z" />
    
    <!-- Second 'I' -->
    <path d="M 292 160 L 332 160 L 332 352 L 292 352 Z" />
    <!-- Serifs for Second 'I' -->
    <path d="M 272 160 L 352 160 L 352 176 L 272 176 Z" />
    <path d="M 272 336 L 352 336 L 352 352 L 272 352 Z" />
  </g>
  
  <!-- Artistic Brush Stroke overlay -->
  <path d="M 120 256 Q 256 180 392 280" fill="none" stroke="url(#grad2)" stroke-width="12" stroke-linecap="round" opacity="0.8" />
</svg>
